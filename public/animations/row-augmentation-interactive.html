<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <title>Row Augmentation — Interactive</title>
    <style>
      :root {
        --bg: #ffffff;
        --grid: #d8dde3;
        --header-bg: #f4f5f7;
        --header-text: #5b6573;
        --text: #1f2937;
        --aug-bg: #e8f1ff;
        --aug-text: #1f3a8a;
        --card-bg: #ffffff;
        --accent: #2B7FFF;
        --accent-hover: #1A6FEF;
        --accent-press: #155CDF;
      }

      html, body {
        margin: 0; padding: 0;
        background: #f6f7f9;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Pretendard", "Apple SD Gothic Neo", system-ui, sans-serif;
        color: var(--text);
      }

      .stage {
        width: 100vw; height: 100vh;
        display: flex; align-items: center; justify-content: center;
      }

      .card {
        width: 416px; height: 186px;
        background: var(--card-bg);
        border-radius: 12px;
        box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 4px 16px rgba(0,0,0,0.04);
        display: flex;
        align-items: flex-end;
        justify-content: center;
        overflow: hidden;
        position: relative;
        padding: 14px 20px 0;
        box-sizing: border-box;
      }

      /* ============ Button ============ */
      .aug-btn {
        position: absolute;
        top: 18px;
        left: 50%;
        transform: translate(-50%, 0) scale(1);
        z-index: 3;
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 6px 12px;
        background: var(--accent);
        color: #fff;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.01em;
        border-radius: 999px;
        box-shadow:
          0 1px 2px rgba(124,109,247,0.25),
          0 6px 14px rgba(124,109,247,0.18);
        white-space: nowrap;
        border: none;
        cursor: pointer;
        transition: background 120ms ease, transform 120ms ease, box-shadow 120ms ease;
      }
      .aug-btn:hover { background: var(--accent-hover); }
      .aug-btn:active { background: var(--accent-press); transform: translate(-50%, 0) scale(0.96); }
      .aug-btn .plus { font-weight: 700; font-size: 12px; line-height: 1; opacity: 0.9; }
      .aug-btn .label { display: inline-block; }

      /* 증강 진행/완료 상태 — 버튼이 우상단으로 작아지며 "리셋"으로 */
      .augmented .aug-btn {
        top: 12px;
        left: auto;
        right: 12px;
        transform: translate(0, 0) scale(1);
        padding: 5px 10px;
        font-size: 10.5px;
        background: #fff;
        color: var(--accent);
        border: 1px solid #e3dfff;
        box-shadow: 0 1px 2px rgba(16,24,40,0.04);
      }
      .augmented .aug-btn:hover { background: #f6f3ff; }
      .augmented .aug-btn:active { background: #ece6ff; }
      .augmented .aug-btn .plus { display: none; }

      /* ============ Table ============ */
      .table-wrap {
        position: relative;
        width: 100%;
        overflow: hidden;
        border-radius: 6px 6px 0 0;
        border: 1px solid var(--grid);
        border-bottom: none;
        background: var(--bg);
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 11px;
        font-variant-numeric: tabular-nums;
      }

      thead th {
        background: var(--header-bg);
        color: var(--header-text);
        font-weight: 600;
        text-align: left;
        padding: 4px 10px;
        border-bottom: 1px solid var(--grid);
        font-size: 9px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      tbody td {
        padding: 3px 10px;
        border-bottom: 1px solid var(--grid);
        border-right: 1px solid var(--grid);
        line-height: 1.35;
      }
      tbody td:last-child { border-right: none; }
      tbody tr:last-child td { border-bottom: none; }

      tbody tr.original td { background: #fff; color: var(--text); }
      tbody tr.aug td      { background: var(--aug-bg); color: var(--aug-text); }

      /* 증강 행은 기본적으로 숨김 (height 0) */
      tbody tr.aug {
        opacity: 0;
      }
      tbody tr.aug td {
        padding-top: 0;
        padding-bottom: 0;
        line-height: 0;
        overflow: hidden;
      }

      /* .augmented 상태에서만 차례로 등장 */
      .augmented tbody tr.aug {
        animation: rowGrow 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      }
      .augmented tbody tr.aug td {
        animation: cellExpand 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      }

      @keyframes cellExpand {
        0%   { padding-top: 0;   padding-bottom: 0;   line-height: 0;    }
        100% { padding-top: 3px; padding-bottom: 3px; line-height: 1.35; }
      }
      @keyframes rowGrow {
        0%   { opacity: 0; }
        40%  { opacity: 1; }
        100% { opacity: 1; }
      }

      .augmented tr.aug:nth-of-type(4)    { animation-delay: 0.05s; }
      .augmented tr.aug:nth-of-type(5)    { animation-delay: 0.13s; }
      .augmented tr.aug:nth-of-type(6)    { animation-delay: 0.21s; }
      .augmented tr.aug:nth-of-type(7)    { animation-delay: 0.29s; }
      .augmented tr.aug:nth-of-type(4) td { animation-delay: 0.05s; }
      .augmented tr.aug:nth-of-type(5) td { animation-delay: 0.13s; }
      .augmented tr.aug:nth-of-type(6) td { animation-delay: 0.21s; }
      .augmented tr.aug:nth-of-type(7) td { animation-delay: 0.29s; }
    </style>
  </head>
  <body>
    <div class="stage">
      <div class="card" id="card">
        <button class="aug-btn" id="augBtn" type="button">
          <span class="plus">+</span><span class="label">증강</span>
        </button>
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>ID</th><th>Age</th><th>Class</th></tr>
            </thead>
            <tbody>
              <tr class="original"><td>001</td><td>27</td><td>A</td></tr>
              <tr class="original"><td>002</td><td>34</td><td>B</td></tr>
              <tr class="original"><td>003</td><td>41</td><td>A</td></tr>

              <tr class="aug"><td>004</td><td>29</td><td>C</td></tr>
              <tr class="aug"><td>005</td><td>31</td><td>B</td></tr>
              <tr class="aug"><td>006</td><td>26</td><td>B</td></tr>
              <tr class="aug"><td>007</td><td>38</td><td>C</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <script>
      const card = document.getElementById('card');
      const btn  = document.getElementById('augBtn');
      const label = btn.querySelector('.label');

      btn.addEventListener('click', () => {
        if (card.classList.contains('augmented')) {
          // 리셋 — 증강 행 즉시 hidden 상태로 되돌림
          card.classList.remove('augmented');
          label.textContent = '증강';
        } else {
          card.classList.add('augmented');
          label.textContent = '리셋';
        }
      });
    </script>
  </body>
</html>
